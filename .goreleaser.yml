version: 2

project_name: metricops

before:
  hooks:
    - go mod tidy

builds:
  - id: metricops
    main: ./cmd/metricops
    binary: metricops
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: ["tar.gz"]
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}
      {{- end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}
      {{- end }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"
      - "typo"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(fix|bug)(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: donchanee
    name: metricops
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## metricops {{ .Tag }}

    Prometheus metric governance CLI for self-hosted operators.

    See README for install and usage. Binaries below; for Go users:

    ```bash
    go install github.com/donchanee/metricops/cmd/metricops@{{ .Tag }}
    ```
  footer: |
    **Full changelog**: https://github.com/donchanee/metricops/compare/{{ .PreviousTag }}...{{ .Tag }}
